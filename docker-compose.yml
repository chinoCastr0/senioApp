services:
    db:
        image: postgres:16
        restart: always
        environment:  
            POSTGRES_USER: seno
            POSTGRES_PASSWORD: seno_dev_password
            POSTGRES_DB: seno_db  
        ports:
            - "5432:5432"
        volumes:
            - ./postgres_data:/var/lib/postgresql/data
      
volumes:
    postgres_data: